<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gastos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100dvh; }

  .header { background: #fff; padding: 16px 20px 12px; border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 22px; font-weight: 700; color: #1c1c1e; }
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .month-nav button { background: none; border: none; font-size: 22px; color: #007aff; padding: 4px 10px; cursor: pointer; }
  .month-label { font-size: 17px; font-weight: 600; color: #1c1c1e; }

  .total-card { background: #007aff; margin: 16px; border-radius: 16px; padding: 20px; text-align: center; }
  .total-label { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .total-value { color: #fff; font-size: 36px; font-weight: 700; margin-top: 4px; }

  .form-card { background: #fff; margin: 0 16px 16px; border-radius: 16px; padding: 16px; }
  .form-card input { width: 100%; border: none; border-bottom: 1px solid #e5e5ea; padding: 12px 4px; font-size: 17px; color: #1c1c1e; outline: none; background: transparent; }
  .form-card input::placeholder { color: #aeaeb2; }
  .form-card input:last-of-type { border-bottom: none; margin-top: 4px; }
  .btn-add { width: 100%; background: #007aff; color: #fff; border: none; border-radius: 12px; padding: 15px; font-size: 17px; font-weight: 600; margin-top: 14px; cursor: pointer; }
  .btn-add:active { background: #0062cc; }

  .section-title { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.4px; margin: 0 20px 8px; }

  .list { margin: 0 16px 32px; background: #fff; border-radius: 16px; overflow: hidden; }
  .item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #f2f2f7; }
  .item:last-child { border-bottom: none; }
  .item-left { flex: 1; min-width: 0; }
  .item-desc { font-size: 16px; color: #1c1c1e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-date { font-size: 12px; color: #8e8e93; margin-top: 2px; }
  .item-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin-left: 12px; }
  .item-value { font-size: 16px; font-weight: 600; color: #1c1c1e; }
  .btn-del { background: none; border: none; color: #ff3b30; font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }

  .empty { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 15px; }

  .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #1c1c1e; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 99; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>💰 Meus Gastos</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
</div>

<div class="total-card">
  <div class="total-label">Total do mês</div>
  <div class="total-value" id="totalValue">R$ 0,00</div>
</div>

<div class="form-card">
  <input type="text" id="descInput" placeholder="Descrição (ex: Mercado, Gasolina...)" autocomplete="off" />
  <input type="number" id="valInput" placeholder="Valor (ex: 59.90)" inputmode="decimal" step="0.01" min="0" />
  <button class="btn-add" onclick="addGasto()">+ Lançar Gasto</button>
</div>

<div class="section-title" id="extractTitle"></div>
<div class="list" id="list"></div>

<div class="toast" id="toast"></div>

<script>
  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  let now = new Date();
  let curYear = now.getFullYear();
  let curMonth = now.getMonth();

  function storageKey(y, m) { return 'gastos_' + y + '_' + m; }

  function load(y, m) {
    try {
      const raw = localStorage.getItem(storageKey(y, m));
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function save(y, m, data) {
    try { localStorage.setItem(storageKey(y, m), JSON.stringify(data)); } catch(e) { console.error(e); }
  }

  function fmtBRL(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function fmtDate(iso) {
    const parts = iso.split('-');
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function render() {
    document.getElementById('monthLabel').textContent = MONTHS[curMonth] + ' ' + curYear;
    document.getElementById('extractTitle').textContent = 'Extrato — ' + MONTHS[curMonth];
    const items = load(curYear, curMonth);
    const total = items.reduce((s, i) => s + i.value, 0);
    document.getElementById('totalValue').textContent = fmtBRL(total);
    const list = document.getElementById('list');
    if (!items.length) {
      list.innerHTML = '<div class="empty">Nenhum gasto lançado este mês.</div>';
      return;
    }
    list.innerHTML = [...items].reverse().map((item, ri) => {
      const realIdx = items.length - 1 - ri;
      return '<div class="item">'
        + '<div class="item-left">'
        + '<div class="item-desc">' + item.desc + '</div>'
        + '<div class="item-date">' + fmtDate(item.date) + '</div>'
        + '</div>'
        + '<div class="item-right">'
        + '<span class="item-value">' + fmtBRL(item.value) + '</span>'
        + '<button class="btn-del" onclick="deleteGasto(' + realIdx + ')">&#215;</button>'
        + '</div></div>';
    }).join('');
  }

  function addGasto() {
    const desc = document.getElementById('descInput').value.trim();
    const val = parseFloat(document.getElementById('valInput').value);
    if (!desc) { showToast('Digite uma descrição'); return; }
    if (!val || val <= 0) { showToast('Digite um valor válido'); return; }
    const today = new Date();
    const iso = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    const items = load(curYear, curMonth);
    items.push({ desc: desc, value: val, date: iso });
    save(curYear, curMonth, items);
    document.getElementById('descInput').value = '';
    document.getElementById('valInput').value = '';
    document.getElementById('descInput').focus();
    showToast('Gasto lançado!');
    render();
  }

  function deleteGasto(idx) {
    if (!confirm('Remover este gasto?')) return;
    const items = load(curYear, curMonth);
    items.splice(idx, 1);
    save(curYear, curMonth, items);
    showToast('Gasto removido');
    render();
  }

  function changeMonth(dir) {
    curMonth += dir;
    if (curMonth > 11) { curMonth = 0; curYear++; }
    if (curMonth < 0) { curMonth = 11; curYear--; }
    render();
  }

  document.addEventListener('keydown', function(e) { if (e.key === 'Enter') addGasto(); });

  render();
</script>
</body>
</html>
